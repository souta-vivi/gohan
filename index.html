<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ご飯カレンダー">
<title>ご飯カレンダー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f4f0; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; }

.tabs {
  display: flex; gap: 6px; padding: 8px 1rem;
  border-bottom: 0.5px solid #e0ddd6; background: #fff;
  position: sticky; top: 0; z-index: 10;
}
.tab-btn {
  font-size: 12px; padding: 4px 12px; border-radius: 8px;
  border: 0.5px solid #c0bdb5; cursor: pointer; background: none; color: #888780;
}
.tab-btn.active { background: #dbeafe; border-color: #93c5fd; color: #1d4ed8; }

.header {
  padding: 1rem 1rem 0.75rem; border-bottom: 0.5px solid #e0ddd6;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 16px; font-weight: 500; color: #1a1a18; }
.week-nav { display: flex; gap: 6px; }
.week-nav button {
  background: none; border: 0.5px solid #c0bdb5; border-radius: 8px;
  padding: 3px 10px; font-size: 13px; cursor: pointer; color: #1a1a18;
}

.grid { display: grid; grid-template-columns: 52px repeat(7, 1fr); }
.day-header {
  padding: 6px 2px; text-align: center; font-size: 10px; color: #888780;
  border-bottom: 0.5px solid #e0ddd6; border-left: 0.5px solid #e0ddd6;
}
.day-header.today { color: #1d4ed8; }
.day-header.sat { color: #1d4ed8; }
.day-header.sun { color: #b91c1c; }
.date-num { display: block; font-size: 14px; font-weight: 500; color: #1a1a18; margin-top: 1px; }
.day-header.today .date-num {
  background: #dbeafe; color: #1d4ed8; border-radius: 50%;
  width: 24px; height: 24px; display: flex; align-items: center;
  justify-content: center; margin: 2px auto 0; font-size: 13px;
}
.col-spacer { border-bottom: 0.5px solid #e0ddd6; }
.member-label {
  padding: 10px 6px; font-size: 12px; font-weight: 500; color: #1a1a18;
  border-bottom: 0.5px solid #e0ddd6; display: flex; align-items: center; gap: 4px;
}
.avatar {
  width: 22px; height: 22px; border-radius: 50%; font-size: 10px;
  font-weight: 500; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.cell {
  border-left: 0.5px solid #e0ddd6; border-bottom: 0.5px solid #e0ddd6;
  padding: 4px 2px; display: flex; align-items: center; justify-content: center;
}
.status-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 0.5px solid #639922; background: #EAF3DE;
  cursor: pointer; font-size: 12px; font-weight: 500; color: #3B6D11;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.status-btn:active { transform: scale(0.88); }
.status-btn.osoi-iru   { background: #FAEEDA; border-color: #BA7517; color: #854F0B; }
.status-btn.osoi-nashi { background: #F1EFE8; border-color: #888780; color: #444441; }
.status-btn.iranai     { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
.status-btn.loading    { opacity: 0.4; pointer-events: none; }
.sub-label { font-size: 7px; line-height: 1; opacity: 0.85; }

.legend {
  display: flex; gap: 8px; padding: 10px 1rem; flex-wrap: wrap;
  font-size: 11px; color: #5f5e5a; border-bottom: 0.5px solid #e0ddd6;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

.sync-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 1rem; font-size: 11px; color: #888780;
  border-bottom: 0.5px solid #e0ddd6; min-height: 28px;
}
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #c0bdb5; flex-shrink: 0;
}
.sync-dot.ok { background: #639922; }
.sync-dot.err { background: #E24B4A; }
.sync-dot.loading { background: #BA7517; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.mama-section { padding: 12px 1rem; }
.mama-day-card {
  margin-bottom: 8px; padding: 10px 12px;
  border: 0.5px solid #e0ddd6; border-radius: 10px; background: #fff;
}
.mama-day-title {
  font-size: 13px; font-weight: 500; color: #1a1a18;
  margin-bottom: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.count-badge {
  font-size: 11px; padding: 1px 8px; border-radius: 10px;
  background: #EAF3DE; color: #3B6D11; font-weight: 500;
}
.mama-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.mama-chip { font-size: 12px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
.chip-iru        { background: #EAF3DE; color: #3B6D11; }
.chip-osoi-iru   { background: #FAEEDA; color: #854F0B; }
.chip-osoi-nashi { background: #F1EFE8; color: #444441; }
.chip-iranai     { background: #FCEBEB; color: #A32D2D; }
</style>
</head>
<body>
<div class="app">
  <div class="tabs">
    <button class="tab-btn active" id="btn-member" onclick="switchView('member')">メンバー別</button>
    <button class="tab-btn" id="btn-mama" onclick="switchView('mama')">ママ用まとめ</button>
  </div>

  <div id="view-member">
    <div class="header">
      <h1 id="week-label"></h1>
      <div class="week-nav">
        <button onclick="changeWeek(-1)">◀</button>
        <button onclick="changeWeek(1)">▶</button>
      </div>
    </div>
    <div class="sync-bar">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-msg">読み込み中...</span>
    </div>
    <div class="grid" id="grid-header"><div class="col-spacer"></div></div>
    <div id="grid-body"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#EAF3DE;border:0.5px solid #639922;"></div><span>○ いる</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#FAEEDA;border:0.5px solid #BA7517;"></div><span>△○ 遅い・いる</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#F1EFE8;border:0.5px solid #888780;"></div><span>△× 遅い・いらない</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#FCEBEB;border:0.5px solid #E24B4A;"></div><span>× いらない</span></div>
    </div>
  </div>

  <div id="view-mama" style="display:none;">
    <div class="mama-section" id="mama-content"></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyD0AG7d86Ir7dLGkF_Q4cZGbueLQWRXN_HmnjZ_kGWb9QONOVK8_tFoDnaMMV5SvcTNg/exec';

const members = [
  { name: '父', initial: '父', color: '#185FA5', bg: '#E6F1FB' },
  { name: '兄', initial: '兄', color: '#3B6D11', bg: '#EAF3DE' },
  { name: '妹', initial: '妹', color: '#993556', bg: '#FBEAF0' },
];
const DAY_NAMES = ['日','月','火','水','木','金','土'];
const STATUSES = [null, 'osoi-iru', 'osoi-nashi', 'iranai'];
const BTN_DISPLAY = {
  'null':       { mark: '○', sub: '',      cls: '' },
  'osoi-iru':   { mark: '△', sub: '○いる', cls: 'osoi-iru' },
  'osoi-nashi': { mark: '△', sub: '×なし', cls: 'osoi-nashi' },
  'iranai':     { mark: '×', sub: '',      cls: 'iranai' },
};
const MAMA_LABEL = {
  'null':       { cls: 'chip-iru',        text: '○ いる' },
  'osoi-iru':   { cls: 'chip-osoi-iru',   text: '△○ 遅い（いる）' },
  'osoi-nashi': { cls: 'chip-osoi-nashi', text: '△× 遅い（いらない）' },
  'iranai':     { cls: 'chip-iranai',     text: '× いらない' },
};

let weekOffset = 0;
let data = {};
let syncing = false;

function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-msg');
  dot.className = 'sync-dot ' + state;
  txt.textContent = msg;
}

async function loadData() {
  setSyncStatus('loading', '読み込み中...');
  try {
    const res = await fetch(GAS_URL + '?t=' + Date.now());
    data = await res.json();
    setSyncStatus('ok', '同期済み');
    render();
  } catch(e) {
    setSyncStatus('err', '読み込み失敗。Wi-Fiを確認して');
    render();
  }
}

async function saveCell(key, value) {
  setSyncStatus('loading', '保存中...');
  try {
    const url = GAS_URL + '?action=save&key=' + encodeURIComponent(key) + '&value=' + encodeURIComponent(value || '');
    await fetch(url);
    setSyncStatus('ok', '保存しました');
  } catch(e) {
    setSyncStatus('err', '保存失敗。もう一度試して');
  }
}

function getWeekDates(offset) {
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - now.getDay() + 1 + offset * 7);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function dateKey(d) { return d.toISOString().slice(0, 10); }
function cellKey(mi, ds) { return `${mi}-${ds}`; }
function getStatus(mi, ds) { return data[cellKey(mi, ds)] || null; }

async function cycleStatus(mi, ds) {
  if (syncing) return;
  syncing = true;
  const cur = getStatus(mi, ds);
  const idx = STATUSES.indexOf(cur);
  const next = STATUSES[(idx + 1) % STATUSES.length];
  const key = cellKey(mi, ds);
  data[key] = next;
  render();
  await saveCell(key, next || '');
  syncing = false;
}

function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}

function render() {
  const dates = getWeekDates(weekOffset);
  document.getElementById('week-label').textContent =
    `${dates[0].getMonth()+1}/${dates[0].getDate()} 〜 ${dates[6].getMonth()+1}/${dates[6].getDate()}`;

  const hdr = document.getElementById('grid-header');
  hdr.innerHTML = '<div class="col-spacer"></div>';
  dates.forEach(d => {
    const dow = d.getDay();
    const div = document.createElement('div');
    div.className = 'day-header' + (isToday(d) ? ' today' : dow===6 ? ' sat' : dow===0 ? ' sun' : '');
    if (isToday(d)) {
      div.innerHTML = `<span>${DAY_NAMES[dow]}</span><div class="date-num">${d.getDate()}</div>`;
    } else {
      div.innerHTML = `<span>${DAY_NAMES[dow]}</span><span class="date-num">${d.getDate()}</span>`;
    }
    hdr.appendChild(div);
  });

  const body = document.getElementById('grid-body');
  body.innerHTML = '';
  members.forEach((m, mi) => {
    const row = document.createElement('div');
    row.className = 'grid';
    const label = document.createElement('div');
    label.className = 'member-label';
    label.innerHTML = `<div class="avatar" style="background:${m.bg};color:${m.color};">${m.initial}</div><span>${m.name}</span>`;
    row.appendChild(label);
    dates.forEach(d => {
      const ds = dateKey(d);
      const status = getStatus(mi, ds);
      const key = status === null ? 'null' : status;
      const disp = BTN_DISPLAY[key];
      const cell = document.createElement('div');
      cell.className = 'cell';
      const btn = document.createElement('button');
      btn.className = 'status-btn' + (disp.cls ? ' ' + disp.cls : '');
      btn.innerHTML = `<span>${disp.mark}</span>${disp.sub ? `<span class="sub-label">${disp.sub}</span>` : ''}`;
      btn.onclick = () => cycleStatus(mi, ds);
      cell.appendChild(btn);
      row.appendChild(cell);
    });
    body.appendChild(row);
  });

  renderMama(dates);
}

function renderMama(dates) {
  const container = document.getElementById('mama-content');
  container.innerHTML = '';
  dates.forEach(d => {
    const ds = dateKey(d);
    const card = document.createElement('div');
    card.className = 'mama-day-card';
    const gohanCount = members.filter((_, mi) => {
      const s = getStatus(mi, ds);
      return s === null || s === 'osoi-iru';
    }).length;
    card.innerHTML = `<div class="mama-day-title">${DAY_NAMES[d.getDay()]}曜日 ${d.getMonth()+1}/${d.getDate()}<span class="count-badge">ご飯 ${gohanCount}人分</span></div>`;
    const chips = document.createElement('div');
    chips.className = 'mama-chips';
    members.forEach((m, mi) => {
      const s = getStatus(mi, ds);
      const k = s === null ? 'null' : s;
      const info = MAMA_LABEL[k];
      const chip = document.createElement('span');
      chip.className = 'mama-chip ' + info.cls;
      chip.textContent = m.name + '：' + info.text;
      chips.appendChild(chip);
    });
    card.appendChild(chips);
    container.appendChild(card);
  });
}

function changeWeek(dir) { weekOffset += dir; render(); }

function switchView(view) {
  document.getElementById('view-member').style.display = view==='member' ? '' : 'none';
  document.getElementById('view-mama').style.display = view==='mama' ? '' : 'none';
  document.getElementById('btn-member').className = 'tab-btn' + (view==='member' ? ' active' : '');
  document.getElementById('btn-mama').className = 'tab-btn' + (view==='mama' ? ' active' : '');
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
